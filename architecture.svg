<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" width="100%" style="background:#0a0f1a;border-radius:12px;font-family:system-ui,sans-serif;">
  <style>
    .title { fill:#e6eef8; font-size:18px; font-weight:bold; text-anchor:middle; }
    .subtitle { fill:#6b8aad; font-size:11px; text-anchor:middle; }
    .node-box { fill:rgba(15,25,45,0.9); stroke:#60d4ff; stroke-width:2; rx:8; }
    .node-title { fill:#60d4ff; font-size:10px; font-weight:600; text-anchor:middle; }
    .node-name { fill:#e6eef8; font-size:13px; font-weight:bold; text-anchor:middle; }
    .node-desc { fill:#6b8aad; font-size:9px; text-anchor:middle; }
    .success-box { fill:rgba(74,222,128,0.15); stroke:#4ade80; stroke-width:2; rx:8; }
    .warning-box { fill:rgba(251,191,36,0.15); stroke:#fbbf24; stroke-width:2; rx:8; }
    .danger-box { fill:rgba(239,68,68,0.15); stroke:#ef4444; stroke-width:2; rx:6; }
    .arrow { stroke:#60d4ff; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
    .arrow-red { stroke:#ef4444; stroke-width:2; fill:none; marker-end:url(#arrowhead-red); }
    .detail-box { fill:rgba(0,10,20,0.6); stroke:#6b8aad; stroke-width:1; rx:6; }
    .detail-text { fill:#6b8aad; font-size:9px; text-anchor:middle; }
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60d4ff"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="350" y="30" class="title">Synapse-Graph Architecture</text>
  <text x="350" y="48" class="subtitle">Interactive: architecture.html</text>
  
  <!-- Dashboard -->
  <g transform="translate(40, 70)">
    <rect class="node-box" width="130" height="95"/>
    <text x="65" y="18" class="node-title">OPERATOR</text>
    <text x="65" y="38" class="node-name">Dashboard</text>
    <text x="65" y="56" class="node-desc">Next.js + React</text>
    <text x="65" y="70" class="node-desc">@xyflow/react</text>
    <text x="65" y="84" class="node-desc">Recharts</text>
  </g>
  
  <!-- Arrow: Dashboard to Proxy -->
  <line class="arrow" x1="170" y1="117" x2="220" y2="117"/>
  <text x="195" y="110" fill="#6b8aad" font-size="9" text-anchor="middle">REST + SSE</text>
  
  <!-- Neural Proxy -->
  <g transform="translate(225, 75)">
    <rect class="node-box" width="200" height="85"/>
    <text x="100" y="18" class="node-title">NEURAL PROXY</text>
    <text x="100" y="38" class="node-name">FastAPI Runtime</text>
    <text x="100" y="56" class="node-desc">Generation + Tracing + Governance</text>
    <text x="100" y="72" class="node-desc">HeadMaskStore + SSE Streaming</text>
  </g>
  
  <!-- Arrows from Proxy -->
  <path class="arrow" d="M225 117 L195 117 L195 170"/>
  <path class="arrow" d="M350 160 L350 170"/>
  <path class="arrow" d="M425 117 L455 117 L455 170"/>
  <text x="340" y="175" fill="#6b8aad" font-size="9" text-anchor="middle">Tracing</text>
  <text x="470" y="165" fill="#6b8aad" font-size="9" text-anchor="middle">Topology + Lineage</text>
  
  <!-- Ollama -->
  <g transform="translate(130, 175)">
    <rect class="success-box" width="130" height="55"/>
    <text x="65" y="18" fill="#4ade80" font-size="10" font-weight="600" text-anchor="middle">GENERATION</text>
    <text x="65" y="38" class="node-name">Ollama</text>
    <text x="65" y="50" class="node-desc">Local LLM</text>
  </g>
  
  <!-- HF Tracer -->
  <g transform="translate(285, 175)">
    <rect class="node-box" width="130" height="55"/>
    <text x="65" y="18" class="node-title">TRACING</text>
    <text x="65" y="38" class="node-name">HF Tracer</text>
    <text x="65" y="50" class="node-desc">PyTorch hooks</text>
  </g>
  
  <!-- OpenMetadata -->
  <g transform="translate(460, 175)">
    <rect class="warning-box" width="130" height="55"/>
    <text x="65" y="18" fill="#fbbf24" font-size="10" font-weight="600" text-anchor="middle">GOVERNANCE</text>
    <text x="65" y="38" class="node-name">OpenMetadata</text>
    <text x="65" y="50" class="node-desc">Topology + Tags</text>
  </g>
  
  <!-- DEFECTIVE Tag -->
  <g transform="translate(460, 265)">
    <rect class="danger-box" width="130" height="45"/>
    <text x="65" y="25" fill="#ef4444" font-size="12" font-weight="bold" text-anchor="middle">DEFECTIVE</text>
    <text x="65" y="40" class="node-desc">→ Runtime Mask</text>
  </g>
  
  <!-- Arrow: OM to DEFECTIVE -->
  <path class="arrow-red" d="M525 230 L525 265"/>
  
  <!-- Detail boxes -->
  <g transform="translate(130, 250)">
    <rect class="detail-box" width="130" height="40"/>
    <text x="65" y="18" class="detail-text">register_forward_hook</text>
    <text x="65" y="32" class="detail-text">AttentionTrace capture</text>
  </g>
  
  <g transform="translate(460, 320)">
    <rect class="detail-box" width="130" height="35"/>
    <text x="65" y="16" class="detail-text">Layer = Table</text>
    <text x="65" y="28" class="detail-text">Head = Column</text>
  </g>
  
  <!-- Arrow: OM to detail -->
  <path class="arrow" d="M525 310 L525 320" stroke-dasharray="3,3"/>
  
  <!-- Legend -->
  <g transform="translate(40, 340)">
    <rect width="14" height="14" rx="3" fill="rgba(15,25,45,0.9)" stroke="#60d4ff" stroke-width="1.5"/>
    <text x="20" y="11" fill="#e6eef8" font-size="10">UI</text>
    <rect x="50" width="14" height="14" rx="3" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>
    <text x="70" y="11" fill="#e6eef8" font-size="10">Gen</text>
    <rect x="100" width="14" height="14" rx="3" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="120" y="11" fill="#e6eef8" font-size="10">OM</text>
  </g>
</svg>